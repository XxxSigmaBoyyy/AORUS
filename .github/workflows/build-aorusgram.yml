name: Build AorusGram IPA

on:
  push:
    branches: [ main, "claude/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: aorusgram

      - name: Cache Telegram iOS source
        id: tg-cache
        uses: actions/cache@v4
        with:
          path: telegram-ios
          key: tg-ios-src-v4

      - name: Clone Telegram iOS
        if: steps.tg-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/TelegramMessenger/Telegram-iOS.git telegram-ios
          cd telegram-ios
          git submodule update --init --depth=1 --jobs=4 || true

      - name: Ensure rlottie submodule
        run: |
          cd telegram-ios
          CPP_COUNT=$(find submodules/rlottie/rlottie/src -name "*.cpp" 2>/dev/null | wc -l)
          echo "rlottie .cpp files found: $CPP_COUNT"
          if [ "$CPP_COUNT" -eq 0 ]; then
            echo "rlottie empty — cloning directly..."
            rm -rf submodules/rlottie/rlottie
            git clone --depth=1 https://github.com/TelegramMessenger/rlottie.git submodules/rlottie/rlottie
          fi
          echo "rlottie .cpp count after: $(find submodules/rlottie/rlottie/src -name '*.cpp' | wc -l)"

      - name: Fix Icon Composer bundles (incompatible with Xcode < 26)
        run: |
          python3 -c "import base64; exec(base64.b64decode('').decode())"
          # Telegram/BUILD globs for .icon/**/* — allow empty so removed dirs don't fail
          echo "build --incompatible_disallow_empty_glob=false" >> telegram-ios/.bazelrc
          echo "Added allow_empty glob flag to .bazelrc"

      - name: Patch SDK compatibility (iOS 26 APIs not in Xcode 15)
        run: |
          python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Inject AorusGram sources
        run: |
          PATCHES=aorusgram/patches
          TG=telegram-ios
          PEER=$TG/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen

          # 1. Copy AorusGramUI module (all new code, no conflicts)
          mkdir -p $TG/submodules/AorusGramUI/Sources
          cp -r $PATCHES/submodules/AorusGramUI/. $TG/submodules/AorusGramUI/

          # 2. Copy PeerInfoScreen BUILD (adds AorusGramUI dep)
          cp $PATCHES/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/BUILD $PEER/

          # 3. Replace PeerInfoSettingsItems.swift (adds aorusGram menu item)
          cp $PATCHES/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/PeerInfoSettingsItems.swift $PEER/Sources/

          # 4. Patch PeerInfoScreen.swift in-place (add case aorusGram to enum)
          # 5. Patch PeerInfoScreenSettingsActions.swift in-place (add import + case)
          python3 -c "import base64; exec(base64.b64decode('').decode())"

          echo "Injection complete"
          echo "--- AorusGramUI sources ---"
          ls -la $TG/submodules/AorusGramUI/Sources/

      - name: Patch app name
        run: |
          PLIST="telegram-ios/Telegram/Telegram-iOS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName AorusGram" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName AorusGram" "$PLIST" 2>/dev/null || true

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
          xcodebuild -version

      - name: Install Bazel
        run: brew install bazel 2>/dev/null || true

      - name: Prepare build config
        working-directory: telegram-ios
        run: |
          echo "=== build-system contents ==="
          ls build-system/ || echo "(no build-system dir)"
          ls build-system/Make/ 2>/dev/null | head -20 || echo "(no Make dir)"
          echo "=== Writing AorusGram appstore-configuration.json (always overwrite) ==="
          # FIX: Official Telegram iOS repo has bundle_id=ph.telegra.Telegraph — must replace
          # with AorusGram bundle ID or keychain access fails and Telegram shows 'no connection'
          python3 -c "import base64; exec(base64.b64decode('').decode())"
          python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Prepare codesigning
        run: |
          mkdir -p $RUNNER_TEMP/signing/profiles
          python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Build (no signing)
        working-directory: telegram-ios
        run: |
          echo "=== Python version ==="
          python3 --version
          echo "=== Starting build ==="
          set -o pipefail
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir ~/tg-bazel-cache \
            build \
            --configurationPath build-system/appstore-configuration.json \
            --codesigningInformationPath $RUNNER_TEMP/signing \
            --buildNumber=${{ github.run_number }} \
            --configuration=debug_arm64 \
            --outputBuildArtifactsPath $RUNNER_TEMP/artifacts \
            --continueOnError \
            2>&1 | tee $RUNNER_TEMP/build.log | tail -100

      - name: Show compile errors
        if: always()
        run: |
          echo "=== First 80 lines ==="
          head -80 $RUNNER_TEMP/build.log 2>/dev/null || echo "(log not available)"
          echo "=== Errors ==="
          grep -E " error:" $RUNNER_TEMP/build.log | head -80 || echo "(none)"
          echo "=== Last 80 lines ==="
          tail -80 $RUNNER_TEMP/build.log 2>/dev/null || echo "(log not available)"

      - name: Commit error log to repo
        if: failure()
        run: |
          cd aorusgram
          mkdir -p build-errors
          cp $RUNNER_TEMP/build.log build-errors/last-build.log 2>/dev/null || echo "(no log)" > build-errors/last-build.log
          git config user.email "ci@aorusgram"
          git config user.name "AorusGram CI"
          git add build-errors/last-build.log
          git diff --cached --quiet || git commit -m "ci: save build log [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}

      - name: Collect build artifacts info
        if: always()
        working-directory: telegram-ios
        run: |
          echo "=== All .app and .ipa files (with symlinks) ===" > $RUNNER_TEMP/found_files.txt
          find -L . -name "*.app" -type d 2>/dev/null | grep -v ".dSYM" >> $RUNNER_TEMP/found_files.txt || true
          find -L . -name "*.ipa" 2>/dev/null >> $RUNNER_TEMP/found_files.txt || true
          echo "=== bazel-bin top-level ===" >> $RUNNER_TEMP/found_files.txt
          ls -la bazel-bin/ 2>/dev/null >> $RUNNER_TEMP/found_files.txt || true
          echo "=== artifacts ===" >> $RUNNER_TEMP/found_files.txt
          find $RUNNER_TEMP/artifacts -type f 2>/dev/null >> $RUNNER_TEMP/found_files.txt || true
          cat $RUNNER_TEMP/found_files.txt

      - name: Package unsigned IPA
        run: |
          # 1. Проверяем --outputBuildArtifactsPath
          IPA=$(find $RUNNER_TEMP/artifacts -name "*.ipa" 2>/dev/null | head -1 || true)

          # 2. Ищем .ipa в bazel-bin (с -L для симлинков)
          if [ -z "$IPA" ]; then
            IPA=$(find -L telegram-ios/bazel-bin -name "*.ipa" 2>/dev/null | head -1 || true)
          fi

          if [ -n "$IPA" ]; then
            echo "Found IPA: $IPA"
            cp "$IPA" $RUNNER_TEMP/AorusGram-unsigned.ipa
          else
            # 3. Ищем .app — сначала в bazel-bin с симлинками, потом везде
            APP=$(find -L telegram-ios/bazel-bin -name "Telegram.app" -type d 2>/dev/null \
              | grep -v ".dSYM" | head -1 || true)

            if [ -z "$APP" ]; then
              APP=$(find -L telegram-ios/bazel-out -name "Telegram.app" -type d 2>/dev/null \
                | grep -v ".dSYM" | head -1 || true)
            fi

            if [ -z "$APP" ]; then
              APP=$(find -L telegram-ios -name "*.app" -type d 2>/dev/null \
                | grep -v ".dSYM" | head -1 || true)
            fi

            if [ -z "$APP" ]; then
              APP=$(find -L $RUNNER_TEMP/artifacts -name "*.app" -type d 2>/dev/null \
                | grep -v ".dSYM" | head -1 || true)
            fi

            if [ -z "$APP" ]; then
              echo "ERROR: No .app found anywhere."
              echo "=== bazel-bin contents ==="
              ls -la telegram-ios/bazel-bin/ 2>/dev/null || echo "(empty or missing)"
              echo "=== artifacts contents ==="
              find $RUNNER_TEMP/artifacts -type f 2>/dev/null || echo "(empty)"
              exit 1
            fi

            echo "Packaging $APP → IPA"
            mkdir -p $RUNNER_TEMP/Payload
            cp -r "$APP" $RUNNER_TEMP/Payload/AorusGram.app
            cd $RUNNER_TEMP && zip -qr AorusGram-unsigned.ipa Payload/
          fi

          ls -lh $RUNNER_TEMP/AorusGram-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: AorusGram-unsigned-${{ github.run_number }}
          path: ${{ runner.temp }}/AorusGram-unsigned.ipa
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: ${{ runner.temp }}/build.log
          retention-days: 7
