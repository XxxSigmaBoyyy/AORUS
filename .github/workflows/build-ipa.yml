name: Build IPA

on:
  push:
    branches: [ main, "claude/**", "cursor/**" ]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode scheme'
        required: false
        default: 'ios-app'

jobs:
  build:
    runs-on: macos-latest

    env:
      SCHEME: ${{ github.event.inputs.scheme || 'ios-app' }}
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      # --- Signing (optional, needed for real device / App Store) ---
      - name: Import certificate
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        if: ${{ env.PROVISIONING_PROFILE_BASE64 != '' }}
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # --- Build ---
      - name: Build (simulator, no signing needed)
        run: |
          xcodebuild \
            -project ios-app/ios-app.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO | xcpretty || true

      - name: Archive (real device, requires signing secrets)
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
        run: |
          xcodebuild \
            -project ios-app/ios-app.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive | xcpretty

      - name: Export IPA
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios-app/ExportOptions.plist \
            -exportPath build/IPA | xcpretty

      - name: Upload IPA artifact
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: App.ipa
          path: build/IPA/*.ipa
          retention-days: 7

      - name: Upload simulator build artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-simulator
          path: build/DerivedData/Build/Products/
          retention-days: 7
